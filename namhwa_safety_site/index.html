<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>남화토건 안전보건팀 로그인</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">

    <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">남화토건(주)</h1>
            <h2 class="text-xl font-semibold text-gray-600 mt-2">안전보건팀 자료실</h2>
        </div>

        <div class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">아이디 (이메일)</label>
                <input type="email" id="email" placeholder="name@namhwa.co.kr" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
                <input type="password" id="password" placeholder="비밀번호 입력" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>

            <button id="login-btn" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md transition duration-300 mt-6">
                로그인
            </button>
            
            <p id="error-msg" class="text-red-500 text-sm text-center mt-2"></p>
        </div>
    </div>

    <script type="module">
        import { auth } from "./firebase.js";
        import { signInWithEmailAndPassword, onAuthStateChanged } 
          from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 1. 이미 로그인 된 상태면 바로 자료실(resource.html)로 이동
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "resource.html";
            }
        });

        // 2. 로그인 버튼 클릭 시
        document.getElementById('login-btn').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            signInWithEmailAndPassword(auth, email, password)
                .then(() => {
                    // 성공 시 위의 onAuthStateChanged가 감지하여 이동시킴
                    console.log("로그인 성공");
                })
                .catch((error) => {
                    if(error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                        errorMsg.innerText = "아이디 또는 비밀번호가 일치하지 않습니다.";
                    } else if (error.code === 'auth/invalid-email') {
                        errorMsg.innerText = "이메일 형식이 올바르지 않습니다.";
                    } else {
                        errorMsg.innerText = "로그인 오류: " + error.message;
                    }
                });
        });
    </script>
</body>
</html>
