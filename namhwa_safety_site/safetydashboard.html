    <script type="text/babel">

        // ==================================================================================
        const firebaseConfig = {

            authDomain: "namhwa-safety-dashboard.firebaseapp.com",
            projectId: "namhwa-safety-dashboard",
            storageBucket: "namhwa-safety-dashboard.firebasestorage.app",

                db = firebase.firestore();
                isFirebaseActive = true;

        } else {
            console.log("⚠️ Firebase 설정 없음: 데모 데이터 모드");
        }

        // --- 아이콘 컴포넌트 ---
        const Icon = ({ children, color = "currentColor", size = 24, className = "" }) => (

        const CalendarIcon = (props) => <Icon {...props}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></Icon>;

        const Users = (props) => <Icon {...props}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
        const MoreHorizontal = (props) => <Icon {...props}><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></Icon>;
        const AlertTriangle = (props) => <Icon {...props}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></Icon>;
        const AlertOctagon = (props) => <Icon {...props}><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Icon>;
        const Save = (props) => <Icon {...props}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></Icon>;
        const Edit2 = (props) => <Icon {...props}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></Icon>;
        const FileText = (props) => <Icon {...props}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></Icon>;

        const Plus = (props) => <Icon {...props}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
        const CheckCircle = (props) => <Icon {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></Icon>;
        const Activity = (props) => <Icon {...props}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></Icon>;
        const Truck = (props) => <Icon {...props}><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></Icon>;
        const FlaskConical = (props) => <Icon {...props}><path d="M10 2v7.527a2 2 0 0 1-.211.896L4.72 20.55a1 1 0 0 0 .9 1.45h12.76a1 1 0 0 0 .9-1.45l-5.069-10.127A2 2 0 0 1 14 9.527V2"/><line x1="8.5" y1="2" x2="15.5" y2="2"/><path d="M8.5 14h7"/></Icon>;
        const X = (props) => <Icon {...props}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
        const Upload = (props) => <Icon {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>;

        const Tool = (props) => <Icon {...props}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></Icon>;
        const FileSpreadsheet = (props) => <Icon {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></Icon>;
        const Settings = (props) => <Icon {...props}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></Icon>;
        const ArrowRight = (props) => <Icon {...props}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></Icon>;
        const ClipboardCheck = (props) => <Icon {...props}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></Icon>;
        const LinkIcon = (props) => <Icon {...props}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></Icon>;

        // --- Mock Data (현장별 구분 구조로 변경) ---
        // key값을 현장 ID(siteA, siteB 등)로 사용
        const SITES_DB = {
            'siteA': {
                name: '대광 새마을금고 골프연습장',
                scheduleUrl: 'https://nhs10331.netlify.app',
                riskWorks: [
                    { id: '1', team: '골조 2팀', task: '203동 갱폼 인양 작업', risk: '상', status: '작업중', manager: '김철수', workerCount: 5, eduCompleted: 5, assessment: '크레인 인양 중 낙하 위험, 신호수 배치 및 하부 통제 철저' },
                    { id: '2', team: '설비 1팀', task: '지하 2층 밀폐공간 용접', risk: '상', status: '예정', manager: '이영희', workerCount: 3, eduCompleted: 2, assessment: '질식 사고 예방을 위한 송풍기 가동 필수, 산소 농도 측정 기록' },
                ],
                notices: [
                    { id: '1', type: '공지', title: '[현장A] 혹서기 근로자 휴게 시간 준수 안내', content: '최고 기온이 33도 이상인 폭염 주의보 발령 시...', author: '안전팀장', date: '05.20' },
                    { id: '2', type: '일정', title: '[현장A] 제5회 안전보건협의체 회의', content: '금일 14:00 현장 회의실...', author: '현장소장', date: '05.21' },
                ],
                issueList: [
                    { id: 101, loc: '105동 3층', desc: '개구부 덮개 미설치로 인한 추락 위험', finder: '안전과장', status: 'new' },
                    { id: 102, loc: '지하 1층', desc: '가설 분전반 접지 누락', finder: '전기반장', status: 'processing' },
                    { id: 103, loc: '야적장', desc: '자재 정리정돈 불량', finder: '관리자', status: 'done' },
                ],
                inspectionLog: [
                    { id: 1, type: '장비', item: '이동식 크레인 (100t)', date: '05.20', status: '합격' },
                    { id: 2, type: '기계', item: '용접기 A-102', date: '05.19', status: '합격' },
                    { id: 3, type: '물질', item: '에폭시 프라이머', date: '05.18', status: '조건부승인' },
                    { id: 4, type: '장비', item: '지게차 3t', date: '05.17', status: '불합격' },
                    { id: 5, type: '장비', item: '고소작업대', date: '05.16', status: '합격' },
                    { id: 6, type: '기계', item: '그라인더', date: '05.15', status: '합격' },
                ],
                workerDetails: [
                    { id: 1, trade: '관리자', count: 12 },
                    { id: 2, trade: '철근공', count: 45 },
                    { id: 3, trade: '목공', count: 30 },
                    { id: 4, trade: '일용직', count: 22 },
                ]
            },
            // 테스트용 두 번째 현장
            'siteB': {
                name: '수원 노유자시설 신축공사',
                scheduleUrl: 'https://nhs10331.netlify.app/suwon.html',
                riskWorks: [
                    { id: 'b1', team: '전기 1팀', task: '임시 전력 인입', risk: '중', status: '작업중', manager: '박준호', workerCount: 3, eduCompleted: 3, assessment: '감전 방지 보호구 착용' },
                ],
                notices: [
                    { id: 'b_n1', type: '공지', title: '[현장B] 우기 대비 점검', content: '배수로 점검 철저', author: '공사과장', date: '05.22' },
                ],
                issueList: [],
                inspectionLog: [],
                workerDetails: [
                    { id: 1, trade: '관리자', count: 5 },
                    { id: 2, trade: '내장목공', count: 15 },
                ]
            }
        };

        const SafetyDashboard = () => {
            const [currentDate, setCurrentDate] = useState('');
            
            // URL 파라미터로 현장 ID 가져오기
            const queryParams = new URLSearchParams(window.location.search);
            const siteId = queryParams.get('siteId') || 'siteA'; 
            const currentSiteData = SITES_DB[siteId] || SITES_DB['siteA'];

            // 상태 관리
            const [startDate, setStartDate] = useState('2024-01-01');
            const [targetDays, setTargetDays] = useState(500);
            const [accidentFreeDays, setAccidentFreeDays] = useState(0);
            const [riskWorks, setRiskWorks] = useState(currentSiteData.riskWorks);
            const [noticeData, setNoticeData] = useState(currentSiteData.notices);
            const [issueList, setIssueList] = useState(currentSiteData.issueList); 
            const [inspectionLog, setInspectionLog] = useState(currentSiteData.inspectionLog);
            const [workerList, setWorkerList] = useState(currentSiteData.workerDetails);
            
            // UI 상태
            const [logoUrl, setLogoUrl] = useState(null);
            const [showWorkerModal, setShowWorkerModal] = useState(false);
            const [showIssueModal, setShowIssueModal] = useState(false);
            const [selectedIssueType, setSelectedIssueType] = useState(null); 
            const [editingWorkId, setEditingWorkId] = useState(null);
            const [showInspectionModal, setShowInspectionModal] = useState(false);
            const [inspectionType, setInspectionType] = useState('');
            const [showSettingsModal, setShowSettingsModal] = useState(false); 
            const [selectedNotice, setSelectedNotice] = useState(null); 

            useEffect(() => {
                const today = new Date();
                setCurrentDate(`${today.getFullYear()}년 ${today.getMonth() + 1}월 ${today.getDate()}일`);
                
                const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());
                const startParts = startDate.split('-'); 
                const startMidnight = new Date(parseInt(startParts[0]), parseInt(startParts[1]) - 1, parseInt(startParts[2]));
                const diffTime = todayMidnight - startMidnight;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)); 
                setAccidentFreeDays(diffDays >= 0 ? diffDays + 1 : 0);

                if (isFirebaseActive && db) {
                    const siteDocRef = db.collection('sites').doc(siteId);
                    const unsubscribeRisk = siteDocRef.collection('riskWorks').onSnapshot(snapshot => {
                        const works = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        if(works.length > 0) setRiskWorks(works);
                    });
                    return () => { unsubscribeRisk(); };
                }
            }, [startDate, siteId]);

            const issueCounts = {
                new: issueList.filter(i => i.status === 'new').length,
                processing: issueList.filter(i => i.status === 'processing').length,
                done: issueList.filter(i => i.status === 'done').length
            };

            // Handlers
            const handleLogoUpload = (e) => { const file = e.target.files[0]; if (file) { const reader = new FileReader(); reader.onloadend = () => setLogoUrl(reader.result); reader.readAsDataURL(file); } };
            const handleWorkEdit = (id) => setEditingWorkId(id);
            const handleWorkSave = async (id) => { setEditingWorkId(null); if (!isFirebaseActive) alert("✅ 저장되었습니다. (데모 모드)"); };
            const handleWorkChange = (id, field, value) => { setRiskWorks(riskWorks.map(work => work.id === id ? { ...work, [field]: value } : work)); };
            const handleAddWork = () => { const newWork = { id: Date.now().toString(), team: '', task: '', risk: '중', manager: '', status: '예정', workerCount: 0, eduCompleted: 0, assessment: '' }; setRiskWorks([...riskWorks, newWork]); setEditingWorkId(newWork.id); };
            const handleWorkerChange = (id, field, value) => { setWorkerList(workerList.map(w => w.id === id ? { ...w, [field]: value } : w)); };
            const handleAddWorker = () => setWorkerList([...workerList, { id: Date.now(), trade: '', count: 0 }]);
            const handleDeleteWorker = (id) => setWorkerList(workerList.filter(w => w.id !== id));
            const handleIssueChange = (id, field, value) => { setIssueList(issueList.map(issue => issue.id === id ? { ...issue, [field]: value } : issue)); };
            const changeIssueStatus = (id, newStatus) => { setIssueList(issueList.map(issue => issue.id === id ? { ...issue, status: newStatus } : issue)); alert(newStatus === 'processing' ? '조치가 시작되었습니다.' : '조치가 완료되었습니다.'); };
            const handleAddNotice = () => { const title = prompt("제목 입력"); if(title) setNoticeData([{ id: Date.now(), type: '공지', title, content: '', author: '관리자', date: new Date().toISOString().slice(5,10) }, ...noticeData]); };
            const openInspectionModal = (type) => { setInspectionType(type); setShowInspectionModal(true); };
            const handleSaveInspection = (e) => { e.preventDefault(); setInspectionLog([{ id: Date.now(), type: inspectionType, item: e.target.item.value, date: new Date().toISOString().slice(5,10), status: e.target.result.value }, ...inspectionLog]); setShowInspectionModal(false); };
            const handleSaveSettings = (e) => { e.preventDefault(); setStartDate(e.target.startDate.value); setTargetDays(e.target.targetDays.value); setShowSettingsModal(false); };
            const closeModal = (setter) => (e) => { if(e.target === e.currentTarget) setter(false); };
            const getStatusColor = (status) => status === '합격' ? 'bg-green-100 text-green-600' : status === '불합격' ? 'bg-red-100 text-red-600' : 'bg-gray-100 text-gray-600';
            const filteredIssues = issueList.filter(i => i.status === selectedIssueType);

            return (
                <div className="min-h-screen bg-gray-50 text-gray-800 font-sans relative pb-20">
                
                {/* Header */}
                <header className="bg-white shadow-sm sticky top-0 z-30">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
                        <div className="flex items-center w-1/4">
                            <label className="cursor-pointer group relative flex flex-col items-center justify-center w-12 h-12 bg-gray-100 rounded-lg border border-gray-200 hover:bg-gray-200 transition overflow-hidden mr-3">
                                {logoUrl ? <img src={logoUrl} alt="Logo" className="w-full h-full object-cover" /> : <div className="text-center"><span className="text-[10px] text-gray-500 font-bold">LOGO</span><div className="text-[8px] text-gray-400">업로드</div></div>}
                                <input type="file" className="hidden" accept="image/*" onChange={handleLogoUpload} />
                            </label>
                            <div>
                                <h1 className="text-xl font-bold text-gray-900 leading-tight">Safety ON</h1>
                                <p className="text-xs text-gray-500">스마트 안전보건 플랫폼</p>
                            </div>
                        </div>
                        <div className="flex-1 text-center">
                            <h2 className="text-4xl font-extrabold text-blue-900 tracking-widest font-['SeoulHangang'] drop-shadow-md">" 남화의 안전을 켜다 "</h2>
                        </div>
                        <div className="flex items-center justify-end space-x-6 w-1/4">
                            <span className="text-sm font-medium text-gray-500 flex items-center hidden sm:flex"><CalendarIcon className="mr-2" size={16} /> {currentDate}</span>
                            <div className="relative cursor-pointer"><Bell className="text-gray-400 hover:text-gray-600" /><span className="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-4 h-4 rounded-full flex items-center justify-center">3</span></div>
                            <div className="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center text-sm font-bold text-gray-600 cursor-pointer">관리</div>

                                        <div className="flex justify-between mb-2 items-center">
                                            <input type="text" className="font-bold text-lg bg-transparent border-b border-dashed border-gray-300 focus:border-blue-500 outline-none w-1/2" value={issue.loc} onChange={(e) => handleIssueChange(issue.id, 'loc', e.target.value)} placeholder="장소 입력"/>
                                            <div className="flex items-center text-sm bg-gray-100 px-2 py-1 rounded"><span className="text-gray-500 mr-2 text-xs">발견자:</span><input type="text" className="bg-transparent border-b border-gray-400 focus:border-blue-500 outline-none w-20 text-gray-700 font-medium text-xs" value={issue.finder} onChange={(e) => handleIssueChange(issue.id, 'finder', e.target.value)}/></div>
                                        </div>
                                        <textarea className="w-full text-gray-600 mb-4 bg-gray-50 border border-gray-200 rounded p-2 text-sm focus:border-blue-500 outline-none resize-none h-20" value={issue.desc} onChange={(e) => handleIssueChange(issue.id, 'desc', e.target.value)} placeholder="부적합 내용을 입력하세요"/>
                                        <div className="grid grid-cols-2 gap-3 mb-4">
                                            <label className="border-2 border-dashed h-24 flex flex-col items-center justify-center text-gray-400 text-xs cursor-pointer hover:border-blue-400 hover:text-blue-500 transition"><Upload size={20} className="mb-1"/><span>조치 전 사진</span><input type="file" className="hidden" accept="image/*" /></label>
                                            <label className="border-2 border-dashed h-24 flex flex-col items-center justify-center text-gray-400 text-xs cursor-pointer hover:border-green-400 hover:text-green-500 transition"><Upload size={20} className="mb-1"/><span>조치 후 사진</span><input type="file" className="hidden" accept="image/*" /></label>
                                        </div>
                                        <div className="flex gap-2">
                                            <button className="flex-1 bg-gray-200 text-gray-700 py-2 rounded text-sm hover:bg-gray-300 font-bold" onClick={() => setShowIssueModal(false)}>내용 저장</button>
                                            {selectedIssueType === 'new' && (<button className="flex-1 bg-yellow-500 text-white py-2 rounded text-sm hover:bg-yellow-600 font-bold flex items-center justify-center" onClick={() => changeIssueStatus(issue.id, 'processing')}>조치 착수 <ArrowRight size={14} className="ml-1" /></button>)}
                                            {selectedIssueType === 'processing' && (<button className="flex-1 bg-green-600 text-white py-2 rounded text-sm hover:bg-green-700 font-bold flex items-center justify-center" onClick={() => changeIssueStatus(issue.id, 'done')}>조치 완료 승인 <CheckCircle size={14} className="ml-1" /></button>)}
                                        </div>
                                    </div>
                                )) : (<div className="text-center text-gray-400 py-10">{selectedIssueType === 'new' ? '신규 발견된 항목이 없습니다.' : selectedIssueType === 'processing' ? '조치 중인 항목이 없습니다.' : '완료된 항목이 없습니다.'}</div>)}
                            </div>
                        </div>
                    </div>
                )}

                {/* 3. 반입 점검 팝업 */}
                {showInspectionModal && (
                    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 animate-fade-in" onClick={closeModal(setShowInspectionModal)}>
                        <div className="bg-white rounded-xl shadow-2xl w-full max-w-md" onClick={e => e.stopPropagation()}>
                            <div className="p-4 flex justify-between items-center bg-blue-600 text-white rounded-t-xl"><h3 className="font-bold">{inspectionType} 점검 등록</h3><button onClick={() => setShowInspectionModal(false)}><X size={24} /></button></div>
                            <form onSubmit={handleSaveInspection} className="p-6 space-y-4">
                                <div><label className="block text-sm font-medium text-gray-700 mb-1">품목명 / 장비명</label><input name="item" type="text" className="w-full border rounded-lg p-2" required placeholder="예: 이동식 크레인, 에폭시 등" /></div>
                                <div><label className="block text-sm font-medium text-gray-700 mb-2">점검 결과</label><div className="flex gap-4"><label className="flex items-center cursor-pointer"><input type="radio" name="result" value="합격" className="mr-2" defaultChecked /><span className="text-sm font-bold text-green-600">합격</span></label><label className="flex items-center cursor-pointer"><input type="radio" name="result" value="불합격" className="mr-2" /><span className="text-sm font-bold text-red-600">불합격</span></label></div></div>
                                <div><label className="block text-sm font-medium text-gray-700 mb-1">세부 점검 내용</label><textarea className="w-full border rounded-lg p-2 h-20" placeholder="특이사항 및 점검 결과를 입력하세요"></textarea></div>
                                <div><label className="block text-sm font-medium text-gray-700 mb-2">점검 사진 / 서류 첨부</label><label className="flex flex-col items-center justify-center w-full h-32 border-2 border-gray-300 border-dashed rounded-lg cursor-pointer hover:bg-gray-50"><div className="flex flex-col items-center justify-center pt-5 pb-6"><Upload className="w-8 h-8 text-gray-400 mb-2" /><p className="text-sm text-gray-500"><span className="font-semibold">클릭하여 업로드</span></p></div><input type="file" className="hidden" /></label></div>
                                <button type="submit" className="w-full bg-blue-600 text-white py-2.5 rounded-lg font-bold hover:bg-blue-700">저장 하기</button>
                            </form>
                        </div>
                    </div>
                )}

                {/* 4. 공지사항 상세 팝업 */}
                {selectedNotice && (
                    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 animate-fade-in" onClick={closeModal(() => setSelectedNotice(null))}>
                        <div className="bg-white rounded-xl shadow-2xl w-full max-w-md" onClick={e => e.stopPropagation()}>
                            <div className="p-4 flex justify-between items-center bg-purple-600 text-white rounded-t-xl"><h3 className="font-bold">공지사항 상세</h3><button onClick={() => setSelectedNotice(null)}><X size={24} /></button></div>
                            <div className="p-6">
                                <div className="flex items-center gap-2 mb-4"><span className={`text-xs font-bold px-2 py-1 rounded ${selectedNotice.type === '공지' ? 'bg-red-100 text-red-600' : 'bg-blue-100 text-blue-600'}`}>{selectedNotice.type}</span><span className="text-sm text-gray-500">{selectedNotice.date} | {selectedNotice.author}</span></div>
                                <h4 className="text-xl font-bold text-gray-800 mb-4">{selectedNotice.title}</h4>
                                <div className="bg-gray-50 p-4 rounded-lg text-gray-700 text-sm min-h-[150px] whitespace-pre-wrap leading-relaxed">{selectedNotice.content}</div>
                                <button onClick={() => setSelectedNotice(null)} className="w-full mt-4 bg-gray-200 text-gray-700 py-2 rounded-lg font-bold hover:bg-gray-300 transition">닫기</button>
                            </div>
                        </div>
                    </div>
                )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SafetyDashboard />);
    </script>
</body>
</html>
